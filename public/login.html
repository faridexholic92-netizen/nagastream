<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NagaStream</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .floating-labels { display: flex; gap: 2rem; flex-wrap: wrap; margin-top: 1.5rem; opacity: .5 }
    .floating-label  { font-size: .75rem; color: var(--text3) }
  </style>
</head>
<body>
  <div class="login-page">
    <!-- Left Panel -->
    <div class="login-left">
      <div class="login-left-decor"></div>
      <div class="login-left-content">
        <div class="login-left-logo">🐉 NagaStream</div>
        <h2>Your Drama Universe</h2>
        <p>Thousands of short dramas from DramaBox, ReelShort, ShortMax & GoodShort — all in one place.</p>
        <div class="floating-labels">
          <span class="floating-label">🎬 DramaBox</span>
          <span class="floating-label">🎬 ReelShort</span>
          <span class="floating-label">🎬 ShortMax</span>
          <span class="floating-label">🎬 GoodShort</span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="login-right">
      <div class="login-form-wrap">
        <h1>Welcome back 👋</h1>
        <p>Sign in to continue to NagaStream</p>

        <form id="loginForm">
          <div class="form-group">
            <label>Username or Email</label>
            <div class="input-group">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <input type="text" id="username" class="form-control" placeholder="Enter username or email" autocomplete="username" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-group">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password" required>
            </div>
          </div>

          <p id="loginError" class="form-error hidden"></p>

          <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn" style="margin-top:.5rem; justify-content:center">
            <span id="loginBtnText">Sign In</span>
            <svg id="loginSpinner" class="hidden" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin .7s linear infinite">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>
        </form>

        <p style="margin-top:2rem; font-size:.8rem; color:var(--text3); text-align:center">
          NagaStream &copy; 2026 — All drama data scraped for personal use
        </p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me').then(r=>r.json()).then(d=>{
      if(d.user) window.location.href = '/'
    })

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn     = document.getElementById('loginBtn')
      const spinner = document.getElementById('loginSpinner')
      const errEl   = document.getElementById('loginError')
      const btnText = document.getElementById('loginBtnText')

      btn.disabled = true
      spinner.classList.remove('hidden')
      btnText.textContent = 'Signing in...'
      errEl.classList.add('hidden')

      const username = document.getElementById('username').value
      const password = document.getElementById('password').value

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        const data = await res.json()

        if (!res.ok) throw new Error(data.error || 'Login failed')

        // Redirect
        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect') || (data.role === 'superadmin' || data.role === 'admin' ? '/' : '/')
        window.location.href = redirect
      } catch (err) {
        errEl.textContent = err.message
        errEl.classList.remove('hidden')
        document.getElementById('password').value = ''
      } finally {
        btn.disabled = false
        spinner.classList.add('hidden')
        btnText.textContent = 'Sign In'
      }
    })
  </script>
</body>
</html>
