<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drama — NagaStream</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav id="navbar">
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="url(#g1)"/><path d="M12 20l6-8 4 5 3-3 5 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="g1" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs></svg>
    NagaStream
  </a>
  <div class="nav-links"><a href="/">Home</a><a href="/browse">Browse</a></div>
  <div class="nav-right">
    <div class="nav-avatar" id="navAvatar"><span id="navAvatarInitial">U</span>
      <div class="nav-dropdown" id="navDropdown">
        <div style="padding:.5rem .75rem .25rem;font-size:.8rem;color:var(--text3)">Signed in as</div>
        <div style="padding:0 .75rem .5rem;font-size:.875rem;font-weight:600" id="navUsername"></div>
        <hr>
        <a href="/admin" id="adminLink" class="hidden">⚙️ Admin</a>
        <button onclick="NS.logout()">🚪 Sign Out</button>
      </div>
    </div>
  </div>
</nav>

<div id="loadingScreen" class="loading-screen">
  <div class="logo">🐉 NagaStream</div>
  <div class="spinner"></div>
</div>

<div id="pageContent" class="hidden">
  <!-- Drama Header -->
  <div class="drama-detail-header" id="dramaHeader">
    <div class="drama-detail-bg">
      <img id="dramaHeaderBg" src="" alt="">
    </div>
    <div class="drama-detail-content">
      <a href="/browse" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text3);margin-bottom:1.5rem">
        ← Back to Browse
      </a>
      <div id="providerBadge" class="provider-badge" style="margin-bottom:.75rem;position:static;display:inline-block"></div>
      <h1 id="dramaTitle" style="font-size:clamp(1.5rem,3vw,2.5rem);font-weight:900;margin-bottom:.75rem;line-height:1.15"></h1>
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem">
        <span id="dramaEps" style="font-size:.875rem;color:var(--text2)"></span>
        <span id="dramaViews" style="font-size:.875rem;color:var(--text2)"></span>
        <span id="dramaStatus" style="font-size:.875rem"></span>
      </div>
      <p id="dramaSynopsis" style="color:var(--text2);line-height:1.7;max-width:560px;margin-bottom:1rem;font-size:.925rem"></p>
      <div id="dramaGenres" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem"></div>
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        <a id="watchFirstBtn" href="#episodes" class="btn btn-primary btn-lg">
          <svg width="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Watch Now
        </a>
        <button class="btn btn-outline btn-lg" id="sourceBtn">
          <svg width="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          Source
        </button>
      </div>
    </div>
  </div>

  <!-- Episode List -->
  <section class="section" id="episodes">
    <div class="section-header">
      <div class="section-title">📺 Episode List</div>
      <span id="epCount" style="font-size:.85rem;color:var(--text3)"></span>
    </div>

    <!-- Lock legend -->
    <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--text3)">
        <div style="width:12px;height:12px;border-radius:2px;background:var(--surface);border:1px solid var(--border)"></div>
        Free
      </div>
      <div style="display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--gold)">
        <div style="width:12px;height:12px;border-radius:2px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)"></div>
        VIP/Locked (on source)
      </div>
    </div>

    <div class="episode-grid" id="episodeGrid"></div>
  </section>

  <!-- Related -->
  <section class="section" style="border-top:1px solid var(--border)">
    <div class="section-header">
      <div class="section-title">🎬 You May Also Like</div>
    </div>
    <div class="drama-grid" id="relatedGrid"></div>
  </section>
</div>

<footer style="padding:2rem;text-align:center;color:var(--text3);font-size:.8rem;border-top:1px solid var(--border)">
  🐉 NagaStream &copy; 2026
</footer>

<div id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
async function init() {
  const user = await NS.loadUser()
  if (!user) return window.location.href = '/login'
  NS.initNavbar()

  const slug = window.location.pathname.split('/drama/')[1]
  if (!slug) return window.location.href = '/browse'

  try {
    const { drama, episodes } = await NS.api('/dramas/' + slug)

    document.title = `${drama.title} — NagaStream`

    // Header bg
    if (drama.cover) document.getElementById('dramaHeaderBg').src = drama.cover

    // Provider badge
    const pb = document.getElementById('providerBadge')
    pb.textContent = drama.provider
    pb.className   = `provider-badge badge-${drama.provider_key}`

    document.getElementById('dramaTitle').textContent    = drama.title
    document.getElementById('dramaSynopsis').textContent = drama.synopsis || 'No synopsis available.'
    document.getElementById('dramaEps').textContent      = `📺 ${drama.total_episodes} Episodes`
    document.getElementById('dramaViews').textContent    = `👁 ${(drama.views||0).toLocaleString()} views`

    const status = document.getElementById('dramaStatus')
    status.textContent = drama.status === 'completed' ? '✅ Completed' : '🔴 Ongoing'
    status.style.color = drama.status === 'completed' ? 'var(--green)' : 'var(--red)'

    // Genres
    const gEl = document.getElementById('dramaGenres')
    ;(drama.genres||[]).forEach(g => {
      const s = document.createElement('span'); s.className='genre-pill'; s.textContent=g; gEl.appendChild(s)
    })

    // Source button
    document.getElementById('sourceBtn').onclick = () => window.open(drama.url, '_blank')

    // Episode grid
    const grid = document.getElementById('episodeGrid')
    document.getElementById('epCount').textContent = `${episodes.length} episodes`

    if (episodes.length) {
      document.getElementById('watchFirstBtn').href = episodes[0].url || '#'
      grid.innerHTML = episodes.map(ep => `
        <a href="${ep.url || '#'}" target="_blank" class="ep-btn ${ep.locked ? 'locked' : ''}" title="${NS.esc(ep.title)}">
          ${ep.locked ? '🔒 ' : ''}EP ${ep.number}
        </a>
      `).join('')
    } else {
      grid.innerHTML = '<p style="color:var(--text3);font-size:.875rem">No episodes found.</p>'
    }

    // Related (same provider)
    const related = await NS.api(`/dramas?provider=${drama.provider_key}&limit=8`)
    const relGrid = document.getElementById('relatedGrid')
    relGrid.innerHTML = related.dramas
      .filter(d => d.slug !== drama.slug)
      .slice(0, 6)
      .map(d => NS.makeDramaCard(d)).join('')

    document.getElementById('loadingScreen').style.display = 'none'
    document.getElementById('pageContent').classList.remove('hidden')

  } catch (err) {
    NS.toast('Drama not found', 'error')
    setTimeout(() => window.location.href = '/browse', 1500)
  }
}
init()
</script>
</body>
</html>
